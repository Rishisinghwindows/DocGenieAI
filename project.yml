name: Olea
options:
  bundleIdPrefix: com.olea
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.0"
  developmentLanguage: en
fileGroups:
  - project.yml
  - README.md
# Locales declared for Xcode's resource resolution. `Localizable.xcstrings`
# under Olea/Resources is the source of truth for string translations.
knownRegions:
  - en
  - es
  - fr
  - hi
  - ar
  - Base
packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads.git
    from: "11.13.0"
  GoogleUserMessagingPlatform:
    url: https://github.com/googleads/swift-package-manager-google-user-messaging-platform.git
    from: "2.7.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_UPCOMING_FEATURE_CONCISE_MAGIC_FILE: "YES"
    SWIFT_STRICT_CONCURRENCY: "minimal"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
    INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    INFOPLIST_KEY_CFBundleDisplayName: "Olea"
    # MOBIRIZER SERVICES PRIVATE LIMITED — paid Apple Developer team that
    # owns the registered com.olea.iosapp App ID (registered 2026-06-06).
    DEVELOPMENT_TEAM: "9YG7G7YB2J"
    CODE_SIGN_STYLE: "Automatic"
targets:
  Olea:
    type: application
    platform: iOS
    sources:
      - path: Olea
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.olea.iosapp
        INFOPLIST_KEY_NSDocumentsFolderUsageDescription: "Olea needs access to your documents to import and manage files."
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Olea can import images from your photo library."
        INFOPLIST_KEY_NSCameraUsageDescription: "Olea uses the camera to scan documents."
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Olea uses your location to automatically tag documents with where they were scanned or imported."
        INFOPLIST_KEY_NSContactsUsageDescription: "Olea matches contact information found in your documents against your address book so you can quickly link documents to the right person."
        INFOPLIST_KEY_NSUserTrackingUsageDescription: "Your data will be used to deliver personalized ads to you. You can change this anytime in Settings."
    info:
      path: Olea/App/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: "Olea"
        CFBundleDevelopmentRegion: en
        # Languages bundled with Olea. The actual translations live in
        # Olea/Resources/Localizable.xcstrings; this key surfaces them in App
        # Store metadata and in iOS Settings → Olea → Language.
        CFBundleLocalizations:
          - en
          - es
          - fr
          - hi
          - ar
        LSSupportsOpeningDocumentsInPlace: true
        UISupportsDocumentBrowser: true
        NSSupportsLiveActivities: true
        NSSupportsLiveActivitiesFrequentUpdates: true
        NSUserTrackingUsageDescription: "Your data will be used to deliver personalized ads to you. You can change this anytime in Settings."
        # Production AdMob app ID for Olea (from AdMob console, 2026-06-06).
        # NOTE: This AdMob app was originally registered against bundle ID
        # com.docgenieai.app. After renaming to com.olea.iosapp on 2026-06-07,
        # update the bundle ID in the AdMob console (App settings → App store
        # information) or ads will fail to serve in production.
        # DEBUG builds use Google test ad-unit IDs from AdsConfig.swift while
        # still using this real app ID — that's how Google wants it.
        GADApplicationIdentifier: "ca-app-pub-6616355428134778~2771258288"
        # Allow Google's ad-fetching domains. AdMob auto-supplies the right list
        # via the SDK; this minimal entry quiets ATS warnings during dev.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
          NSAllowsArbitraryLoadsForMedia: true
          NSAllowsArbitraryLoadsInWebContent: true
        # SKAdNetworkItems for iOS attribution. Apple-required list from
        # Google's docs; abridged here — fetch full list from
        # https://developers.google.com/admob/ios/quick-start#skadnetwork
        # and paste in before App Store submission.
        SKAdNetworkItems:
          - SKAdNetworkIdentifier: cstr6suwn9.skadnetwork
          - SKAdNetworkIdentifier: 4fzdc2evr5.skadnetwork
          - SKAdNetworkIdentifier: 4pfyvq9l8r.skadnetwork
          - SKAdNetworkIdentifier: 2fnua5tdw4.skadnetwork
          - SKAdNetworkIdentifier: ydx93a7ass.skadnetwork
          - SKAdNetworkIdentifier: 5a6flpkh64.skadnetwork
          - SKAdNetworkIdentifier: p78axxw29g.skadnetwork
          - SKAdNetworkIdentifier: v72qych5uu.skadnetwork
          - SKAdNetworkIdentifier: ludvb6z3bs.skadnetwork
          - SKAdNetworkIdentifier: cp8zw746q7.skadnetwork
          - SKAdNetworkIdentifier: 3sh42y64q3.skadnetwork
          - SKAdNetworkIdentifier: c6k4g5qg8m.skadnetwork
          - SKAdNetworkIdentifier: s39g8k73mm.skadnetwork
          - SKAdNetworkIdentifier: 3qy4746246.skadnetwork
          - SKAdNetworkIdentifier: hs6bdukanm.skadnetwork
          - SKAdNetworkIdentifier: mlmmfzh3r3.skadnetwork
          - SKAdNetworkIdentifier: v4nxqhlyqp.skadnetwork
          - SKAdNetworkIdentifier: wzmmz9fp6w.skadnetwork
          - SKAdNetworkIdentifier: su67r6k2v3.skadnetwork
          - SKAdNetworkIdentifier: yclnxrl5pm.skadnetwork
