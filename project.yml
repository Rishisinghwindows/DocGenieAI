name: DocGenieAI
options:
  bundleIdPrefix: com.docgenieai
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_UPCOMING_FEATURE_CONCISE_MAGIC_FILE: "YES"
    SWIFT_STRICT_CONCURRENCY: "minimal"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
    INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    INFOPLIST_KEY_CFBundleDisplayName: "DocGenie AI"
targets:
  DocGenieAI:
    type: application
    platform: iOS
    sources:
      - path: DocGenieAI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.docgenieai.app
        INFOPLIST_KEY_NSDocumentsFolderUsageDescription: "DocGenie AI needs access to your documents to import and manage files."
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "DocGenie AI can import images from your photo library."
        INFOPLIST_KEY_NSCameraUsageDescription: "DocGenie AI uses the camera to scan documents."
    info:
      path: DocGenieAI/App/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: "DocGenie AI"
        LSSupportsOpeningDocumentsInPlace: true
        UISupportsDocumentBrowser: true
        CFBundleDocumentTypes:
          - CFBundleTypeName: "Documents"
            LSHandlerRank: "Alternate"
            LSItemContentTypes:
              - "com.adobe.pdf"
              - "org.openxmlformats.wordprocessingml.document"
              - "com.microsoft.word.doc"
              - "org.openxmlformats.spreadsheetml.sheet"
              - "com.microsoft.excel.xls"
              - "org.openxmlformats.presentationml.presentation"
              - "com.microsoft.powerpoint.ppt"
              - "public.plain-text"
              - "public.image"
    dependencies:
      - target: DocSageWidgetExtension
        embed: true
      - target: DocSageShare
        embed: true
  DocSageWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: DocSageWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.docgenieai.app.widget
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: DocSageWidget/Info.plist
        SKIP_INSTALL: "YES"
  DocSageShare:
    type: app-extension
    platform: iOS
    sources:
      - path: DocSageShare
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.docgenieai.app.share
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: DocSageShare/Info.plist
        SKIP_INSTALL: "YES"
        APP_INTENTS_DEPLOYMENT_POSTPROCESSING: "NO"
  DocGenieAITests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: DocGenieAITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
    dependencies:
      - target: DocGenieAI
