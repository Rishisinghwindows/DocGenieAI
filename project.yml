          - SKAdNetworkIdentifier: 2u9pt9hc89.skadnetwork
          - SKAdNetworkIdentifier: 8s468mfl3y.skadnetwork
          - SKAdNetworkIdentifier: klf5c3l5u5.skadnetwork
          - SKAdNetworkIdentifier: ppxm28t8ap.skadnetwork
          - SKAdNetworkIdentifier: ecpz2srf59.skadnetwork
          - SKAdNetworkIdentifier: uw77j35x4d.skadnetwork
          - SKAdNetworkIdentifier: pwa73g5rt2.skadnetwork
          - SKAdNetworkIdentifier: mtkv5xtk9e.skadnetwork
          - SKAdNetworkIdentifier: 578prtvx9j.skadnetwork
          - SKAdNetworkIdentifier: 4dzt52r2t5.skadnetwork
          - SKAdNetworkIdentifier: e5fvkxwrpn.skadnetwork
          - SKAdNetworkIdentifier: 8c4e2ghe7u.skadnetwork
          - SKAdNetworkIdentifier: zq492l623r.skadnetwork
          - SKAdNetworkIdentifier: 3rd42ekr43.skadnetwork
          - SKAdNetworkIdentifier: 3qcr597p9d.skadnetwork
        CFBundleDocumentTypes:
          - CFBundleTypeName: "Documents"
            LSHandlerRank: "Alternate"
            LSItemContentTypes:
              - "com.adobe.pdf"
              - "org.openxmlformats.wordprocessingml.document"
              - "com.microsoft.word.doc"
              - "org.openxmlformats.spreadsheetml.sheet"
              - "com.microsoft.excel.xls"
              - "org.openxmlformats.presentationml.presentation"
              - "com.microsoft.powerpoint.ppt"
              - "public.plain-text"
              - "public.image"
    dependencies:
      - target: OleaWidgetExtension
        embed: true
      - target: OleaShare
        embed: true
      - package: GoogleMobileAds
      - package: GoogleUserMessagingPlatform
  OleaWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: OleaWidget
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.olea.iosapp.widget
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: OleaWidget/Info.plist
        SKIP_INSTALL: "YES"
  OleaShare:
    type: app-extension
    platform: iOS
    sources:
      - path: OleaShare
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.olea.iosapp.share
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: OleaShare/Info.plist
        SKIP_INSTALL: "YES"
        APP_INTENTS_DEPLOYMENT_POSTPROCESSING: "NO"
  OleaTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: OleaTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
    dependencies:
      - target: Olea
